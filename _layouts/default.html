<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}">

<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  {% include head-custom.html %}

  {% seo %}
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' x='50' text-anchor='middle' font-size='90'>🌸</text></svg>">
</head>

<body>
  <header>
    <div class="container" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:nowrap;">
      <div>
        <a id="a-title" href="{{ '/' | relative_url }}" style="display:flex; align-items:center; gap:10px;">
          <img src="{{ site.github.owner_gravatar_url }}" loading="eager" style="width:50px; border-radius:50%;">
          <h1 style="margin:0;">{{ site.title | default: "" }}</h1>
        </a>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <a href="https://x.com/uddercover" class="header-social-btn" target="_blank">𝕏</a>
        <a href="http://discordapp.com/users/1017401377158344715" class="header-social-btn" target="_blank">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 127.14 96.36" fill="currentColor">
            <path
              d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z" />
          </svg>
        </a>
        <button id="theme-toggle" onclick="toggleTheme()">🌸</button>
      </div>
    </div>
  </header>


  <div class="container">
    <section id="main_content">
      {{ content }}
    </section>
  </div>

  <script>
    document.querySelectorAll('a').forEach(link => {
      if (link.hostname !== window.location.hostname) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });

    function filterTable(tag) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('table tbody tr').forEach(row => {
        if (tag === 'all' || row.innerText.includes(tag)) {
          row.style.display = '';
        } else {
          row.style.display = 'none';
        }
      });
    }

    function toggleTheme() {
      const isLight = document.body.classList.contains('light-mode');
      const btn = document.getElementById('theme-toggle');

      btn.classList.add('clicked');

      btn.style.transition = 'transform 0.6s ease';
      btn.style.transform = isLight ? 'rotate(-360deg)' : 'rotate(360deg)';

      setTimeout(() => {
        btn.style.transition = 'none';
        btn.style.transform = 'rotate(0deg)';
      }, 600);

      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    // Remember preference on page load
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
    }
  </script>
</body>

</html>
